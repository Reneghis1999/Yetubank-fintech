<svg width="960" height="580" viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>YetuBank Cards</title>
  <defs>
    <linearGradient id="blackCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="blackShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.07)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="blackGlow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" style="stop-color:rgba(74,222,128,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>

    <linearGradient id="greenCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#15803D"/>
    </linearGradient>
    <linearGradient id="greenShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:rgba(74,222,128,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>

    <linearGradient id="whiteCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="whiteShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="whiteGlow" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:rgba(34,197,94,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>

    <linearGradient id="chipGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af5a"/>
      <stop offset="50%" style="stop-color:#f0d080"/>
      <stop offset="100%" style="stop-color:#b8922a"/>
    </linearGradient>

    <linearGradient id="iconGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <linearGradient id="iconDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>

    <filter id="shadowBlack" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
    <filter id="shadowGreen" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="rgba(21,128,61,0.45)"/>
    </filter>
    <filter id="shadowWhite" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="#F8FAFC"/>

  <!-- ===================== -->
  <!-- CARD 1 — BLACK        -->
  <!-- ===================== -->
  <g transform="translate(68, 165) rotate(-8, 140, 87.5)" filter="url(#shadowBlack)">
    <rect width="280" height="175" rx="18" fill="url(#blackCardBg)"/>
    <rect width="280" height="175" rx="18" fill="url(#blackShine)"/>
    <rect width="280" height="175" rx="18" fill="url(#blackGlow)"/>
    <circle cx="260" cy="-30" r="90" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="40"/>
    <circle cx="260" cy="-30" r="130" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="30"/>
    <!-- Logo -->
    <g transform="translate(18, 18)">
      <rect width="22" height="22" rx="6" fill="url(#iconGreen)"/>
      <line x1="6" y1="7" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="7" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="13" x2="11" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="17" cy="5" r="2.5" fill="rgba(255,255,255,0.3)"/>
    </g>
    <text x="48" y="33" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="-0.01em">
      <tspan font-weight="700" fill="#FFFFFF">Yetu</tspan><tspan font-weight="300" fill="rgba(255,255,255,0.65)">Bank</tspan>
    </text>
    <!-- Chip -->
    <rect x="18" y="62" width="36" height="28" rx="5" fill="url(#chipGold)"/>
    <line x1="18" y1="72" x2="54" y2="72" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <line x1="18" y1="80" x2="54" y2="80" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <line x1="30" y1="62" x2="30" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
    <line x1="42" y1="62" x2="42" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
    <!-- NFC -->
    <g transform="translate(64, 66)">
      <path d="M0,14 Q6,-2 12,14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4,14 Q8,4 16,14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M8,14 Q10,8 20,14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Card number -->
    <text x="18" y="124" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="0.18em">4291  ••••  ••••  8847</text>
    <!-- Expiry only -->
    <text x="18" y="154" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="0.1em">EXPIRES</text>
    <text x="18" y="165" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.85)">08/29</text>
    <!-- Mastercard -->
    <circle cx="244" cy="28" r="14" fill="rgba(235,0,27,0.75)"/>
    <circle cx="258" cy="28" r="14" fill="rgba(255,130,0,0.75)"/>
    <ellipse cx="251" cy="28" rx="5" ry="11" fill="rgba(235,90,0,0.8)"/>
  </g>

  <!-- ===================== -->
  <!-- CARD 2 — GREEN        -->
  <!-- ===================== -->
  <g transform="translate(340, 130) rotate(2, 140, 87.5)" filter="url(#shadowGreen)">
    <rect width="280" height="175" rx="18" fill="url(#greenCardBg)"/>
    <rect width="280" height="175" rx="18" fill="url(#greenShine)"/>
    <rect width="280" height="175" rx="18" fill="url(#greenGlow)"/>
    <circle cx="280" cy="0" r="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="50"/>
    <circle cx="-20" cy="175" r="80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="30"/>
    <!-- Logo -->
    <g transform="translate(18, 18)">
      <rect width="22" height="22" rx="6" fill="rgba(255,255,255,0.22)"/>
      <line x1="6" y1="7" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="7" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="13" x2="11" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="17" cy="5" r="2.5" fill="rgba(255,255,255,0.35)"/>
    </g>
    <text x="48" y="33" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="-0.01em">
      <tspan font-weight="700" fill="#FFFFFF">Yetu</tspan><tspan font-weight="300" fill="rgba(255,255,255,0.75)">Bank</tspan>
    </text>
    <!-- Chip -->
    <rect x="18" y="62" width="36" height="28" rx="5" fill="url(#chipGold)"/>
    <line x1="18" y1="72" x2="54" y2="72" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <line x1="18" y1="80" x2="54" y2="80" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <line x1="30" y1="62" x2="30" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
    <line x1="42" y1="62" x2="42" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
    <!-- NFC -->
    <g transform="translate(64, 66)">
      <path d="M0,14 Q6,-2 12,14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4,14 Q8,4 16,14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M8,14 Q10,8 20,14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Card number -->
    <text x="18" y="124" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.7)" letter-spacing="0.18em">5512  ••••  ••••  3301</text>
    <!-- Expiry only -->
    <text x="18" y="154" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.55)" letter-spacing="0.1em">EXPIRES</text>
    <text x="18" y="165" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#FFFFFF">11/28</text>
    <!-- Visa -->
    <text x="228" y="34" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" font-style="italic" fill="rgba(255,255,255,0.9)" letter-spacing="-0.02em">VISA</text>
  </g>

  <!-- ===================== -->
  <!-- CARD 3 — WHITE        -->
  <!-- ===================== -->
  <g transform="translate(610, 170) rotate(7, 140, 87.5)" filter="url(#shadowWhite)">
    <rect width="280" height="175" rx="18" fill="url(#whiteCardBg)"/>
    <rect width="280" height="175" rx="18" fill="url(#whiteShine)"/>
    <rect width="280" height="175" rx="18" fill="url(#whiteGlow)"/>
    <rect width="280" height="175" rx="18" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
    <circle cx="280" cy="0" r="100" fill="none" stroke="rgba(34,197,94,0.08)" stroke-width="50"/>
    <!-- Logo -->
    <g transform="translate(18, 18)">
      <rect width="22" height="22" rx="6" fill="url(#iconDark)"/>
      <line x1="6" y1="7" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="7" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="13" x2="11" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="17" cy="5" r="2.5" fill="rgba(255,255,255,0.35)"/>
    </g>
    <text x="48" y="33" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="-0.01em">
      <tspan font-weight="700" fill="#111827">Yetu</tspan><tspan font-weight="300" fill="#374151">Bank</tspan>
    </text>
    <!-- Chip -->
    <rect x="18" y="62" width="36" height="28" rx="5" fill="url(#chipGold)"/>
    <line x1="18" y1="72" x2="54" y2="72" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <line x1="18" y1="80" x2="54" y2="80" stroke="rgba(0,0,0,0.2)" stroke-width="0.8"/>
    <line x1="30" y1="62" x2="30" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
    <line x1="42" y1="62" x2="42" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
    <!-- NFC -->
    <g transform="translate(64, 66)">
      <path d="M0,14 Q6,-2 12,14" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4,14 Q8,4 16,14" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M8,14 Q10,8 20,14" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Card number -->
    <text x="18" y="124" font-family="'Courier New',monospace" font-size="13" fill="rgba(0,0,0,0.35)" letter-spacing="0.18em">3782  ••••  ••••  1056</text>
    <!-- Expiry only -->
    <text x="18" y="154" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.4)" letter-spacing="0.1em">EXPIRES</text>
    <text x="18" y="165" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#111827">03/30</text>
    <!-- Mastercard -->
    <circle cx="244" cy="28" r="14" fill="rgba(235,0,27,0.65)"/>
    <circle cx="258" cy="28" r="14" fill="rgba(255,130,0,0.65)"/>
    <ellipse cx="251" cy="28" rx="5" ry="11" fill="rgba(235,90,0,0.7)"/>
  </g>

</svg>
