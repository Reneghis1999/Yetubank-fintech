<svg width="260" height="60" viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>YetuBank Logo — Dark</title>
  <desc>YetuBank fintech logo on dark background</desc>

  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect x="0" y="0" width="260" height="60" rx="12" fill="#000000"/>

  <!-- Icon container -->
  <rect x="16" y="12" width="36" height="36" rx="9" fill="url(#iconGrad)"/>

  <!-- Y-flow mark -->
  <line x1="26"  y1="22" x2="34" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="22" x2="34" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="34" y1="30" x2="34" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Accent dot -->
  <circle cx="43" cy="19" r="4" fill="rgba(255,255,255,0.28)"/>

  <!-- Wordmark -->
  <text
    x="62" y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    letter-spacing="-0.02em">
    <tspan font-weight="700" fill="#FFFFFF">Yetu</tspan><tspan font-weight="300" fill="rgba(255,255,255,0.72)">Bank</tspan>
  </text>
</svg>
